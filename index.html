<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon_griffin.png" />
    <link rel="apple-touch-icon" href="/favicon_griffin.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metvero — The Intelligence Layer for Higher Education</title>
    <meta name="description" content="Metvero builds foundational software that transforms how institutions understand and serve their students." />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA redirect handler for GitHub Pages
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
